  text: 夢粱録卷七宋吳自牧撰杭州杭城號武林又曰錢塘次稱胥山隋朝特創立次郡杭僅三十六里九十步後武肅錢王發民丁與十三寨軍卒增築羅城周圍七十里許有南城門稱為龍山東城門號為南土北土保德北城門名北關今在餘杭門外人家門首有青石孰是也西城門曰水西關在雷峯塔前城中有門者三曰朝天門曰闕門曰鹽橋門宋太平興國年間錢王納土闕安有號為寧海軍高廟於紹興嵗南渡闕此遂稱為行在所其地襟江抱湖川湊闕衍民物阜蕃非殊方下郡比也自歸宋闕易名旱門僅十有三水門者五城南門者闕嘉會城樓絢綵為諸門冠蓋此門為御道遇南郊五輅欲此幸郊臺路城東門者七曰北水門曰南水門蓋禁中水從此流注出鐵沙河及橫河橋下其門有鐵窗柵鎖閉不曽輒開曰便門曰候潮門曰保安水門河通跨浦橋與江相隔耳曰保安門俗呼小堰門也曰新開門城東門者三曰崇新門俗呼薦橋門曰東青門俗呼菜市曰艮山門城北門者三曰天宗水門曰餘杭水門曰餘杭門舊名北關是也蓋此門浙西蘇湖常秀直至江淮諸道水陸俱通城西門者四曰錢塘門曰豐豫門即湧金曰清波即俗呼暗門也曰錢湖門其諸門內便門東青艮山皆甕城水門皆平屋其餘旱門皆造樓閣諸城壁各高三丈餘橫闊丈餘禁約嚴切人不敢登犯者凖條治罪城內元三門俱廢之獨朝天門止存兩城壁杭人獨以門稱之大河橋道自和寧門外登平坊內曰登平橋次曰六部橋即都亭驛橋北曰黑橋兒玉牒所對巷曰州橋執政府大渠南曰安永橋次曰國清橋投東轉北曰保安延夀橋𣙜貨務東曰阜民橋不通舟楫合同場前曰過軍橋雜賣場西曰通江橋沿大河直至曰望仙橋次曰崇陽宫橋介真道館前曰三聖橋榮王府前曰佑聖觀橋沿河看位前曰榮王府橋常慶坊東北曰太和樓橋俗名柴垜冨樂坊東曰薦橋北曰豐樂橋善履坊東曰油蠟局橋元呼新橋興福坊東曰鹽橋上奉廣福孚順孚惠孚佑侯蔣相公祠橋東一直不通水旱橋名蒲橋咸淳倉前曰咸淳倉橋元名東橋御酒庫東曰塌坊橋仙林寺東曰仙林寺橋平糴倉北曰西橋豐儲倉後曰葛家橋東曰通濟橋俗名梅家橋御酒庫北曰小梅家橋通濟橋北曰田家橋次曰普濟橋白洋池前曰白洋池橋次曰方家橋自大河直通天宗水門至三閘也小河橋道自宗陽宫橋轉西河曰鍾公橋次曰清泠橋南瓦子前曰熙春樓橋南瓦內投西曰灌肺嶺橋通和坊東曰金波橋北曰普濟橋次曰巧兒橋寶佑坊曰寶佑橋五間樓巷東曰亨橋賢福坊東曰平津橋俗名貓兒橋橋北曰舍人橋次曰永清橋鐵線巷西曰水巷橋次曰新橋羲和坊曰芳潤橋元名炭橋武志坊東曰李博士橋次曰棚橋新安坊東曰新安橋出御街投北曰衆安橋投東入延定坊曰鵝鴨橋次曰安國橋又名北橋橋北曰軍頭司橋懷逺坊出御街投北曰闕橋橋之西曰貢院橋次曰藩封酒庫橋雜作院西曰祥符橋橋西曰小新莊橋普寧坊東曰清逺橋仁和縣衙對巷曰仁和倉橋縣巷北曰萬嵗橋六部架閣庫前曰天水院橋淳祐倉前曰倉橋次曰永新橋出餘杭水門亦由於三閘水路也其衆安與觀橋皆平坦與御街同蓋四孟車駕經由此兩橋轉西禮部貢院路一直過新莊橋詣景靈宫行孟饗禮也西河橋道自衆安橋轉西曰衆樂橋次曰下瓦子橋沂王府北曰結縛橋十官宅前曰石灰橋次曰八字橋元呼洗麩橋南曰馬家橋次曰鞔鼓橋清河坊東曰洪橋次曰井亭橋曰施水坊橋西橫街有橋名曲阜其橋不通舟楫水脈自六房院後石橋下湖水從此流出也韓府南曰軍將橋次曰三橋子西樓酒庫前曰惠遷橋元呼金義庫橋羅漢洞巷對曰侍郎橋向有侍郎姓廉名郎叔居此又有賢德及人里巷賢之以盛名以橋記之南真道館前曰施家橋斷河頭五顯祠後曰普濟橋再自八字橋轉西曰清湖橋次曰黑橋左藏庫前曰左藏庫橋楊駙馬宫前投西曰安濟橋潘國巷路通接洋街路曰安福橋直抵故太學次曰丁家橋霍史居廟前曰長生老人橋錢塘縣巷曰縣橋跨真珠河曰真珠河橋此兩橋俱不通舟國子監前曰紀家橋監後曰車橋側曰青龍橋茶湯巷西曰長夀橋舊名楊姑橋萬夀觀前曰新壯橋景靈宫前曰車馬橋鎮城倉西曰師姑橋餘杭門裏中正橋元呼斜橋水門前曰釣橋舊名便橋水路出餘杭水門通三閘也小西河橋道自西樓酒庫側三橋南入惠遷橋西過惠遷井曰太常寺後小橋次曰臺官衙後門橋六房省院對曰如意橋度牒庫後巷曰永安橋即五聖廟橋西曰渡子橋次曰湧金橋界子誦金三池之中矣湧金門北沿城鑷子井東曰鑷子井橋張府後俞家園東曰永安橋六房後門曰石橋此三橋俱不通舟湖水永於橋下暗溝注於曲阜橋下流出西河俞家園九官宅闕曰白蓮橋花宅北投西巷曰紅蓮花橋兩橋俱旱橋耳又自渡子橋轉南轉運司衙前曰普安橋油車巷對曰德夀橋府學前曰凌家橋謝二郎使前曰定安橋慈幼居前曰戒子橋樓店務橋次曰流福橋元呼閘兒橋臨安府治前曰州橋俗名懊來橋蓋因到訟庭者到此心己悔也故以此名呼之倚郭城南橋道城南所管地界自白塔嶺下橋曰進隆兒門裏夏家橋交朩場後曰楊婆洋泮橋東曰李家橋本廂治所南曰洋泮橋馬倉巷口名紅橋子美政坊前曰美政橋雪醅庫東曰南新橋俗呼朱橋嘉會門外曰利涉橋酒庫巷內曰上梁家橋顔家樓對巷曰下梁家橋浙江亭側跨浦橋便門外投南橫河橋布行前亦名橫河橋鮝團前曰渾水閘橋南外庫南曰蕭公橋大郎巷口曰上泥橋南外酒庫對巷曰清水閘橋候潮門外南曰衆惠橋護聖步軍南曰下泥橋候潮門外直東曰上欏木橋又名普濟白旗寨對巷曰下欏朩橋護聖上教場門東曰上洪橋中教場門東曰中教場橋下教場門東曰柴市橋盛