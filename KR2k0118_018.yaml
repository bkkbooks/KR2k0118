body:
  text: 夢粱録卷十八宋吳自牧撰民俗杭城風俗凡百貨賣飲食之人多是裝飾車擔盤盒器皿新潔精巧以耀人耳目蓋效學汴京氣象及因髙宗南渡後常宣喚買市所以不敢茍簡食味亦不敢草率也且如士農工商諸行百戶衣巾裝著皆有等差香鋪人頂帽披背子質庫掌事裹巾著皂衫角帶街市買賣人各有服色頭巾各可辨認是何名目人自淳祐年來衣冠更易有一等晚年後生不體舊規裹闕巾異服三五為羣鬬美誇麗殊令人厭見非復舊時淳朴矣但杭城人皆篤髙誼若見外方人為人所欺衆必為之救解或有新搬移來居止之人則鄰人爭借動事遺獻茶湯指引買賣之類則見睦鄰之人又率錢物安排酒食以為之賀謂之暖房朔望茶水往來至于吉凶等事不特慶弔之禮不廢甚者出力與之扶持亦睦鄰之道者不可不知戶口杭城者為都㑹之地人煙稠密戶口浩繁與他州外郡不同姑以自隋唐朝考之是時隋戶一萬五千三百八十唐貞觀中戶三萬五千七十一口一十五萬三千七百二十九唐開元戶八萬六千二百五十八宋朝太平寰宇記錢塘戶數主六萬一千六百八客八千八百五十七九域志主一十六萬四千二百九十三客三萬八千五百二十三中興兩朝國史該户二十萬五千三百六十九乾道志戶二十六萬一千六百九十二口五十五萬二千六百七淳祐主客戶三十八萬一千三十五口七十六萬七千七百三十九咸淳志九縣共主客户三十九萬一千二百五十九口一百二十四萬七百六十錢塘仁和兩赤縣乾道志主客户該十萬四千六百六十九口該一十四萬五千八百八淳祐志戶該一十一萬一千三百三十六口三十二萬四百八十九咸淳志兩赤縣城主客戶一十八萬六千三百三十口四十三萬二千四十六自今而往則嵗閏月長殆未易以算數也物産榖之品杭早占城紅蓮礌泥烏雪裏盆赤稻黃秈米杜糯光頭糯蠻糯大麥小麥麻赤白烏黃豆大黑大紫大白大黃大青白扁黑扁白小赤小菉豆小紅樓子菉青豌白眼羊眼白江白豌刀豆粟狗尾金罌絲之品綾柿蒂狗蹄羅花素結羅熟羅線佳錦內司街坊以絨背為佳尅絲花素二種杜䌍又名起線鹿胎次名透背皆花紋特起色樣織造不一紵絲染絲所織諸顔色者有織金閃褐間道等類紗素紗天淨三法暗花紗栗地紗茸紗絹官機杜村唐絹幅闊者密畫家多用之綿以臨安於潜白而灑密者佳紬有綿線織者土人貴之枲之品桑柘麻苧貨之品茶寶雲茶香林茶白雲茶又寶嚴院垂雲亭亦産東坡以詩戲之云妙供來香積珍烹具大官揀芽分雀舌賜茗出龍團蓋南北兩山七品諸山皆産徑山採榖雨前茗以小缶貯饋之鹽湯鎮仁和村鹽官浮山新興下管上管蜀山岩門南路茶槽等場嘗産之地漢置鹽官吳王濞煮海為鹽之地蜜蠟紙餘杭由拳村出藤紙富陽有小井紙赤亭山有赤亭紙菜之品諺云東菜西水南柴北米杭之日用是也臺心矮菜矮黃大白頭小白頭夏菘黃芽冬至取巨菜覆以草即久而去腐葉以黃白纎瑩者故名之芥菜生菜菠菱菜萵苣苦藚葱薤韭大蒜小蒜紫茄水茄梢瓜黃瓜葫蘆名蘆冬瓜瓠子芋山藥牛蒡茭白蕨菜蘿蔔甘露子水芹蘆筍雞頭菜藕條菜薑薑芽新薑老薑菌多生山谷名黃耳菌東坡詩云老楮忽生黃耳菌故人兼致白芽薑蓋大者淨白名玉菌黃者名茅菌赤者名竹孤若食須薑煮薑勿黑食果之品橘富陽王洲者佳橙有脆綿朩梅有消便糖透黃桃有金銀水蜜紅穰細葉紅餅子李有透紅蜜明紫色杏金麻柿方頂牛心紅柿椑柿牛妳水柿火珠步檐麵柿梨雪糜玉消陳公蓮蓬梨賞花甜霄砂爛棗鹽官者最佳蓮湖中生者名繡蓮尤佳瓜青白黃等色有名金皮沙皮蜜甕等筒銀瓜藕西湖下湖仁和護安村舊名范堰産扁眼者味佳菱初生嫩者名沙角硬者餛飩湖中有如栗子樣古塘大紅菱林檎塢氏園名花紅郭府園未熟時以紙剪花樣貼上熟如花木瓜嘗進奉其味蜜甜枇杷無核者名椒子東坡詩云緑暗初迎夏紅殘不及春魏花非老伴盧橘是鄉人木瓜青色而小土人剪片爆熟入香藥貨之或糖煎名熝木瓜櫻桃有數名稱之淡黃者甜石榴子顆大而白名玉榴紅者次之楊梅亦有數種紫者甜而頗佳葡萄黃而瑩白者名珠子又名水晶最甜紫而瑪瑙色者稍晚雞頭古名又名雞䜃壅平聲錢塘梁諸頭仁和藕湖臨平湖俱産西湖生者佳却産不多可篩為粉銀杏栗子甘蔗臨平小林産以土􅎒至春夏味猶不變小如蘆名荻蔗亦甜竹之品竹碧玉間黃金筀淡紫斑金苦方竹鶴膝貓頭竹筍有數名日南路白象牙哺雞貓兒頭黃鶯晚篁皆即凉筍和靖有煙崖早筍肥之句又有紫筍邉筍朩之品桑數種名青桑白桑拳桑大小梅紅雞爪等類梓朩中王柘柏孤山陳朝最古松惟天目者斜短稚健栝子三針華山四針桐檜楠東坡詩云中和堂後古楠樹與君對床聽雨聲櫧櫟槐杉桂檀􅚃楓榆栁金湖堤最盛垂者名楊長條可玩棕名栟櫚筍可蒸煨味微苦太冷青神鳳集目奇者名之花之品牡丹有數種色樣又一本冬月開花詩云一朵嬌紅翠欲流春光回報雪霜羞韓文公詠牡丹詩幸自同開俱隱約何須相倚鬬輕盈凌晨併作新粧面對客偏含不語情雙燕無機還拂掠逰蜂多思正經營長年是事都拋盡今日䦨邉眼暫明石曼卿詩獨步性兼吳苑艷渾身天與漢宫香李山甫詩邀勒春風不早開衆芳飄後上樓臺數苞仙艷火中出一片異香天上來曉露精神妖欲動莫煙情態恨成堆知君已解相如薄斜憑䦨干首重回又嫚黃妖紫間輕紅榖雨初晴早景中靜女不言還愛日綵雲無定只嫌風爐烟坐覺沉檀薄粧面回看粉黛空此别又須經嵗月酒䦨把燭繞芳叢有一種秋開牡丹誠山詩咏云白帝工夫縷綵霞肯將顔色弄韶華酒粘織女秋衣薄風動姮娥寶髻斜霜露莫摧今日蘂輪蹄多看異時花隂陽多苦栽培地不趂春風有幾家芍藥有早緋玉綴露千葉白者佳梅花有數品緑蕚千葉香梅東坡和秦太虛云西湖處士骨應槁只有此詩君壓倒又詩云江頭千樹春欲暗竹外一枝斜更好林和靖詩二首吟懷長恨負芳時為見梅花輒入詩雪後園林才半樹水邉籬落忽橫枝人憐紅艷多應俗天與清香似有私堪笑胡雛亦風味解將聲調角中吹又衆芳搖落獨暄妍占斷風情向小園疏影橫斜水清淺暗香浮動月黃昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金尊戴石屛詠梅韻曰瀟灑春葩縞壽陽百花惟有此花強月中分外精神出雪裏幾多風味長折向書窗疑是玉吟來齒頰亦生香年年茅舍江村畔勾引詩人費品量王介甫詠曰頗怪梅花不肯開豈知有意待春來燈前玉面披香出雪後春容取勝回觸撥清詩成走筆淋漓紅袖趣傳杯望塵俗眼那知此只買夭桃艷杏栽潘紫巖詠曰柴門盡日少蹄輪坐對橫窗數㸃春心向雪中偏暴白影來月上亦精神十分洗盡鉛華相百劫修來貞潔身笑殺唐人風味短不應喚作弄珠人又咏落梅詩曰一夜風吹恐不禁曉來零落巳駸駸忍看病鶴和苔啄空遣飢蜂繞竹尋稚子躊蹰看不掃老夫索寞坐微吟窗前最是關情處拾片殷勤玩掌心楊元素落花詩曰夜來經雨學啼妝今日摧紅怨夕陽巳落旋隨春水急强留還怯晚風狂應將别恨憑鶯語更把歸期趂蝶忙誰謂多情消不得夢魂猶惜滿䦨香更諸賢詠梅詩曰木落山寒獨占春十分清瘦轉精神雪疏雪密花添伴溪淺溪深樹寫真三弄笛聲風過耳一枝笻影月隨身吟魂欲斷相逢處恐是孤山隱逸人韓偓梅花詩云北陸候才變南枝花已開無人同悵望把酒獨徘徊凍月雪為伴寒香風是媒何因逢越使腸斷謫仙材東坡和楊公濟詩云緑鬢尋春湖畔回萬松嶺上一枝開學士任希夷宿直玉堂賦梅邊小池詩云眼見梅花照玉堂只將濃緑覆宫牆虬枝偃蓋雲千疊下䕃清池玉一方紅梅有福州潭州紅柔枝千葉邵武紅等種東坡詩云寒心未肯隨春態酒暈無端上玉肌周必大在祕書省館中次洪邁紅梅韻詩云紅羅亭深宫酒遲宫花四面誰得知南唐內苑中有紅羅亭四面専植紅梅見雜志蓬山移植自何世國色含酒紛滿枝初疑太真欲起舞霓裳拂拭天然姿又如東家窺墻女施朱映粉尤相宜不然朝雲頩薄怨自持似對襄王時須㬰胭脂著雨落整妝俯照含風漪逰蜂戲蝶日採掇嗟爾何異氓之蚩提壺火急就公飲他日墮馬空啼眉周必大在祕書省著庭中詠緗梅詩云繭黃織就費天機傳與園林晚出枝東觀奇章承詔後南昌故尉欲仙時芳心向日重重展清馥因風細細知詩志品題猶誤在紅梅未是獨開遲臘梅有數種檀心磬口者佳東坡詩有蜜蜂采花作黃蠟之句又詩云萬松嶺上黃千葉玉蘂檀心兩奇絶周必大詠黃蠟梅在省中次王十朋韻化工未幻酴醿菊先放緗梅伴羣玉幽姿著意添鉛黃正色向心輕蕚緑粧成自衒風味深對此寧辭食無肉方憐涪翁被渠惱中氣悔屏杯杓醁碧蟬棠棣金林檎郁李迎春長春桃花有數種單葉千葉餅子緋桃白桃杏花玉簮水仙薔薇寶相月季小牡丹粉團徘徊貴官家以花片製作餅兒供筵佛見笑聚八仙百合滴滴金石竹和靖詩云深枝冉冉裝溪翠碎片英英剪海霞木香酴醿二種有白而心紫者亦有黃色俱香馥馥然可愛者省中種黃梅在酴醿側黃魯直戲答王觀復酴醿詩云誰將陶令黃金菊幻作酴醿白玉花櫻桃花萱草梔子蜜友金燈金沙山丹真珠又名醮水青條白蘂燦然可玩剪紅羅錦帶錦堂春笑厭靣大笑金鉢盂菊品最多有七十餘種荷花紅白色千葉者西湖荷蕩邊風送荷香馥然白樂天有繞郭荷花三十里之句屬官楊萬里在西府直舍詠盆池種荷詩二首曰飛空天鏡墮莓苔玉井移蓮盆內栽坐看一花隨手長挨開半葉出頭來稍添茭荇相縈帶便有龜魚數往回剩欲繞池三兩匝數聲排馬苦相催又曰西府寒泉汲十尋深澆淺灑碧森森髙花巳照紅粧鏡小蘂新抽紫玉簮鈿破尚餘折雨恨繖疏繞作半池隂西湖瘦得盆來大更伴詩人恐不禁瑞香種頗多大者名錦薰籠東坡詩云幽香結湘紫來自孤峯雲骨香不自知色淺意殊深紅辛夷蕙東坡題楊次公詩蕙本蘭之族依然臭味同曽為水仙佩相識楚詞中蘭東坡詩云春蘭如美人不採羞自獻時聞風露香蓬艾深不見紫薇花東坡詩曰虛白堂前合抱花秋風落日照橫斜後省有此花任希夷詠曰清曉開軒俯鳳池小山經雨石增輝琉璃葉底珊瑚畔立出池邊是紫薇紫楊紫荆花雞冠有三色鳳仙杜鵑蜀葵有二種黃葵映山紅花金銀蓮子花嬰粟櫻桃花唐時樟亭驛種雙樹樂天詩云南館飛軒兩樹櫻春條長定夏隂成素華朱實今雖盡碧葉風來别有情七里香橙花榴花有數種單葉千葉色有數色頃唐時孤山有此花白樂天詩云山榴花似結紅巾容艷新妍占斷春色相故開行道地香塵悔觸坐禪人朩犀有黃紅白色者其香且韻頃天竺山多天長橋慶樂園有數十株士大夫嘗往賞此奇香向東坡送花贈元素詩云月闕霜濃細蘂乾此花原屬桂堂仙鷲峯子落驚前夜蟾窟枝空記昔年髙宗在壽宫時賞桂嘗命畫工為岩桂扇面仍製御詩分賜羣臣親王云秋入幽巖桂影團香深粟粟照林丹應隨王母瑶池宴染得朝霞下廣寒楊誠齊詠桂花詩云塵世何曽識桂林花仙夜入廣寒深移將天上衆香國寄在梢頭一粟金露下風髙月當戶夢回酒醒客聞砧詩情惱得渾無那不為龍涎與水沉華嶽咏曰西風吹老碧蓮房萬壑風流坼麝囊謾與籬花爭晚色肯教盆蕙壓秋芳月中有女曽分種世上無花敢鬬香要識仙根迥然别一枝開傍御家墻詠落英詩淨掃庭階襯落英西風吹恨入蓬瀛人從紫麝囊中過馬在黃金屑上行眠醉不須鋪錦褥妍香還解作珠纓宫娥未許填溝壑收拾流蘇浸玉罌山茶磬口茶玉茶千葉多心茶秋茶東西馬塍色品頗盛栽接一本有十色者有早開而晚發大率變物之性盜天之氣雖時亦可違他花往往皆然頃有接花詩云花單可使千色黃果奪天之造化朩芙蓉蘇堤兩岸如錦湖水影而可愛秋日如霞錦內庭亦有芙蓉閣盛開如錦紫巖詠芙蕖詩云為惜艷陽籹新枝不肯長緑深秋後雨紅坼夜來霜偏向垂楊岸多臨古岸旁年年根蒂在闕藥之品雲母藁本茵芋鬼田木鱉以上本草載杭州所有地黃牛膝仁和繭橋白石種乾薑上件並嵗貢蛇床子白石生躑躅花根名天門冬生錢塘富陽白芷千金草繭橋生威靈仙茱茰澤蘭鬼箭烏藥鈎藤覆盆子麥門冬白及牽牛地骨皮牛蒡地膚百合香附子乾葛並出富陽木通何首烏劉寄奴生富陽小井藜蘆草烏秦皮百部根生天目山菖蒲生桑白皮芍藥荆芥薄荷紫蘇天南星生於潜昌化天花粉即瓜蔞根馬兜鈴白皮白解皮石竹子山蕷黃精生於潜餘杭山枸杞茯苓半夏貫衆地扁蓄苦練皮益母草生龍井山谷山豆根牡丹皮車前子石膏錢塘縣西有山出如雪瑩白舊縣治亥地有獄産此寒水石南髙峯塔下生軟者寒水硬者石膏蒲黃榆白皮鳳眼草金星草生南髙峯黃皮生於潜及雷峯塔下石燕九色山洞中皆有之枳實續斷青蒿子香薷千年潤土人呼為地蜈蚣草石香葇禽之品雀宋書云鹽官屬有白雀之異鵝雞有數種山雞家雞朝雞鴨鵲鴿鷴雉鷗鵪鶉鷺鸛鳩鷹鷂鶻鴟燕韓溉咏云對語春風翠滿衣碧江迢遞往來稀逺空盡日和煙去深院無人帶雨飛珠箔下時猶脈脈畫堂深處正依依王孫盡許營巢穩慣聽笙歌夜不歸鶯元稹咏曰天上金衣侣還能貺草萊風流晉王謝言語漢鄒枚公等久安在今從何處來山禽正嘈噆慰我日徘徊鸜鵒鶺鴒又名雪姑竹雞鵁鶄鶻鵃紺練鸕鶡亦名鸕鷀鐟沙魚虎章雞白頭翁烏頭白頰蠟嘴告天杜鵑沈樂山咏云到得春深便憶鄉要歸歸去底須忙催闕壟月情何切染遍林花恨更長夢破四山風雨夜心灰萬里利名場為言蜀道今非昔縱使歸來亦斷腸布榖畫眉百舌林和靖詩云百種堪憐好言語一般惟缺好毛衣婆餅焦提壺和靖過下湖别墅詩多謝提壺鳥留人到落暉黃雀鸂鶒和靖春日即事詩鴛鴦如綺杜衡肥鸂鶒夷猶翠瀲微偷倉家鷯八歌兒披綿鷺鷥邵棠咏云如鷴非鶴自精神天地江湖快爾生既不鵑吟因甚瘦何嘗食素也能清隨身釣具去無計繫到處畫圖來便成見說得魚歸較晚蘆花灘上月偏明徐靈祐咏鷺詩云一㸃白如雪頂粘絲數莖沙邉行有迹空外過無聲髙栁巢方穩危灘立不驚每看閒意思漁父是前生鈎輈和靖詩云雲木叫鈎輈野鳬獸之品馬昔吳越錢王牧馬於錢塘門外東西馬塍其馬蕃息至盛號為馬海今餘杭臨安於潜三邑猶有牧馬遺蹟豕牛鹿虎狐狸麂係牛尾玉面生於昌化於潜山中有之兔獺猫都人畜之捕鼠有長毛白黃色者稱曰獅猫不能捕蟲以為美觀多府第貴宫諸司人畜之特見貴愛犬為警盜太平廣記載靈隱寺造北髙峯塔有寺犬自山下銜磚石至山巔吻為流血人憐之以草繫磚於背塔成犬斃寺僧恤銜磚之功葬於寺門八面松下又錢塘縣界地名狗葬橋名良犬故老相傳云昔人被火燎幾斃犬入水以濡其主得蘇省後犬死里人葬之立此名旌其義耳蟲魚之品鯉鯽西湖産者骨軟肉鬆鱖獨西湖無此種鱨鯿鱧鯔鱣鱸鱭鱓鮎黃顙白頰􅹷鯽石首王右軍帖云此魚首有石是野鴨之化䔕春鱉鯊白鰣六和塔江邉生極鱗腴而肥江北者味差減鯕䱕􅳬鰍鰻蚌龜鱉又名神守蝦湖河生者殼青江産者名白蝦大者名青斑蝦蝤蛑黃甲蟛蜞彭蚏産鹽官蟹淮南子云蚌蟹珠龜與月盛衰皆隂屬也西湖舊多葑田蟹鱉産之今湖中官司開坼蕩地艱得矣和靖詩有草泥行郭索之句劉貢父詩云稻熟水波老霜螯巳上罾味尤堪薦酒香美最宜橙殼薄胭脂染膏腴琥珀凝情知烹大鼎何似莫橫行蜆蛤螺有數種螺螄海螺田螺海螄金魚有銀白玳瑁色者東坡有詩云我識南屏金鯽魚又曰金鯽池邉不見君則此色魚舊亦有之今錢塘門外多蓄飬入城貨賣名魚兒活豪貴府第宅舍作池蓄之青芝塢玉泉池中盛有大者且水清泉湧巨魚泛逰堪愛免本州嵗納及苗稅杭州乃吳分野號古揚州昔武肅錢王統二浙地狹民稠賦斂苛暴人不堪生太宗朝納土後命考功范旻知兩浙諸州事鎮撫除一切苦虐之政蠲損害之賦民得更生四野老稚咸鼓舞於德意之中紹興年間六飛南渡寬恩大頒首除嵗貢御綾百匹景定年間度宗踐阼之初首遵先朝遺志蠲免臨安府近例嵗貢增添納進錢一百一十五萬八千五百四十貫有奇更有纍政帥臣申錢塘仁和兩赤縣寺觀府第官舍撥賜田地免徴折帛苗糧及册逃虧賦等苗咸淳嵗九縣畸零稅絹除赦文蠲免一尺以外尹京潜皋墅更與本州代輸一尺以上絹畸零稅色計一十四萬六千五百七十一人有奇紐該界錢十八界㑹子計三萬四千四百八十貫文又苗米不及一升者朝家巳行蠲放外其一升以下至一斗以下秋苗米本州代輸寬民力通計八千八百一石有奇紐該價錢十八界二十六萬九千闕百五十貫更代輸咸淳七年本州夏稅畸零錢共該十八界四十六萬七千六百四貫潜尹京首尾三載代輸頗多誠有德於百姓深足嘉尚矣免本州商稅杭州五稅場自趙安撫節齊申請減放外一嵗共收十八界㑹四十二萬貫為定額景定改元以來朝家務欲平物價紓寬民力纍降㫖蠲免商稅仍令本州具合收稅額申省科還咸淳二年二月又降指揮再免商稅五日以便商賈自後帥府遵承朝㫖接續展放蠲免稅額常以五月為期朝省每五月一次照本府征額撥一十八界一十七萬五千貫文以補郡費至今行之百姓與商賈人等莫不歌舞感戴上賜此歷代所罕有也恩霈軍民宋朝行都於杭若軍若民生者死者皆䝉雨露之恩但霈澤常頒難以枚舉姑述其一二焉遇朝省祈晴請雨禱雪求瑞或降生及聖節日分淫雨雪寒居民不易或遇慶典大禮明堂皆頒降黃榜給賜軍民各關㑹二十萬貫文蓋杭郡乃駐蹕之所故有此恩例耳兼官私房屋及基地多是賃居還僦金或出地錢但屋地錢俱分大中小三等錢如遇前件祈禱恩典官私出榜除放房地錢大者三日至七日中者五日至十日小者七日至半月如房舍未經減者遇大禮明堂赦文條畫謂一貫為減除三日止令公私收七百或年嵗荒歉米價頓窮官私置立米場以官米賑濟或量收價錢務在實惠及民更因熒惑為災延燒民屋官私差官吏於火場上具抄被災之家各家老小隨口數分大小給散錢米官置柴場城內外共設二十一場許百司官㕔及百姓從便收買價錢官司量收與市價大有饒潤民有疾病州府置施藥局於戒子橋西委官監督依方修製丸散㕮咀來者疹視詳其病源給藥醫治朝家撥錢一十萬貫下局令帥府多方措置行以賞罰課督醫員月以其數上其州家備申朝省或民以病收投局則畀之藥必奏更生之效局側有局名慈幼官給錢典雇乳婦養在局中如陋巷貧窮之家或男女幼而失母或無力撫養拋棄於街坊官收歸局養之月給錢米絹布使其飽暖養育成人聽其自便生理官無所拘若民間之人願收養者聽官仍給月錢一貫米三斗以三年住支更有老疾孤寡貧之不能自存及丐者等人陳請於朝委仁和錢塘縣官以病坊改作養濟院籍家姓名每名官給錢米贍之此見朝家恤貧救老如此又殿步馬三司養軍以護行都及秋防之備月給錢糧春冬請衣綿使之飽暖遇有差出日給口券成功則賞如三司招軍補額之時每刺一卒官給關㑹一二封衣裝七事件則出軍先散處發關㑹及衣裝則軍妻老幼月支贍家米糧隨軍日支券糧功成則轉資給犒如陳亡官給津送妻兒仍支贍孀幼之糧更有兩縣置漏澤園一十二所寺菴寄留槥櫝無主者或暴露遺骸俱瘞其中仍置屋以為春秋祭奠聽其親屬享祀官府委德行僧二員主管月給各支常平錢五貫米一石瘞及二百人官府保明申朝家給賜紫衣師號賞之恤貧濟老杭城富室多是外郡寄寓人居蓋此郡鳳凰山謂之客山其山髙木秀背䕃及寄寓者其寄寓人多為江商海賈穹桅巨舶安行於烟濤渺莽之中四方百貨不趾而集自此成家立業者衆矣數中有好善積德者多是恤孤念苦敬老憐貧每見此等人買賣不利坐困不樂觀其聲色以錢物周給助其生理或死無周身之具者妻兒罔措莫能支吾則給散棺木助其火葬以終其事或遇大雪路無行徑長幼啼號口無飲食身無衣蓋凍餓於道者富家沿門親察其孤苦艱難遇夜以碎金銀或錢㑹插於門縫以周其苦俾侵晨開戶得之如自天降或散以紙被絮襖與貧丐者便暖其體如此賑於飢寒得濟合家感戴無窮矣俗諺云作善者降百祥天神祐之作惡者賜千災鬼神隨之天之報善罰惡甚於影響世人以此為鑒也夢梁録卷十八
