body:
  text: 夢粱録卷十宋吳自牧撰諸官舍左右丞相參政知樞密院使簽書府俱在南倉前大渠口侍從宅在都亭驛東臺官宅在油車巷省府官屬宅在開元宫對牆卿監郎官宅在俞家園七官宅在郭婆井五官宅在仁美坊三官宅在潘閬巷十官宅在舊睦視坊六房院即後省官所居處在湧金門東如意橋北五房院即樞密院諸承旨所居處在楊和王府西也府治臨安府治在流福坊橋右州橋左首亭扁曰手詔亭右首亭扁曰迎春左入近民坊巷節推察判二廳次則左司理院出街右首則右司理院府院及都總轄房入府治大門左首軍資庫與監官衙右首帳前統制司次則客將客司房轉南入簽廳都門係臨安府及安撫司僉廳有設廳在內僉廳外兩側是節度庫鹽事所給關局財賦司牙闕局户房將官房提舉房投南教場門側曰香逺閣閣後會茶亭閣之左是見錢庫分使庫搭材親兵使馬等房再出僉廳都門外投西正衙門俱廊俱是兩司點檢所都吏職級平分點檢等房正廳例帥臣不曽坐蓋因皇太子出判於此臣下不敢正衙坐正廳後有堂者三扁曰簡樂清平見廉堂後曰聽雨亭左首誦讀書院正衙門外左首曰東廳每日早晚帥臣坐衙在此治事廳後有堂者四扁曰恕堂清暑有美三桂東廳側曰常直司曰點檢所曰安撫司曰竹山閣曰都錢激賞公使三庫庫後有軒扁曰竹林軒之後堂扁曰愛民承化講易三堂堂後曰牡丹亭東廳右首曰客位左首曰六局房祗候書表司親事官虞候授事等房而己府治外流福井對及仁美坊三通判安撫司官屬衙居焉府治前市井亦盈鋪席甚多蓋經訟之人往來駢集買賣要鬧處也運司衙西浙運司衙舊在雙門北為南北二廳今邊豐像門南渡子橋西普安橋為東西二衙曰東衙有寬民堂福星樓節闕堂振襟堂堂側建榭曰西衙有周咨堂公生明堂繡春堂仁惠堂堂有栽修竹而圍之運司僉廳提領犒賞酒庫所俱在運司衙門主管文字幹辦公事在俞家園主管帳司廳在戒子橋之北后戚府昭慈聖獻孟太后宅在後市街顯仁韋太后宅在薦橋東憲節邢皇后宅在薦橋南憲聖慈烈吳太后宅在州橋東成穆郭皇后宅在佑聖觀後成恭夏皇后宅在豐樂橋北成肅謝皇后宅在豐禾坊南慈懿孝皇后宅在後市街恭淑韓皇后宅在軍將橋恭聖仁烈楊太后宅在漾沙坑夀和聖福謝太后宅在龍翔宫側全皇后宅在豐禾坊南其后戚宅元各賜家廟五室及祭器儀物每四孟祭享官給以御闕兵治祭饌太常寺差奉常官行贊相禮仍差主管官影堂使臣及兵給守之以子孫世領祠事諸王宫吳王府在後洋街益王府在新橋秀安僖王府在後洋街漢王府在西橋莊文太子府在井亭橋沂靖惠王府在清湖北景獻太子府在鐵冶嶺榮文恭王府在佑聖觀橋東周漢國瑞孝長公主在左藏庫西各賜家廟祭器嵗時祭禮及影堂使臣主奉官兵級等循戚宅列制行之矣家廟忠烈張循王府在清河坊賜廟祀循王以上五世祖頒祭器法式聽其自造仍差主管一員影堂使臣二員兵級二十七名以子孫世領祠事忠武韓蘄王府在前洋街賜廟祀頒祭器惟賜銅爵勺各一餘竹木頒圖飾作式聽其自製一應事儀如前制同忠勇劉鄜王府在明慶寺南建廟賜祭器並如前式忠烈楊和王府在洪橋清河坊賜家廟與祭器下將作監造以賜嵗時行禮官給厨兵太常遣贊相以奉常餘皆如前制行太傅平章魏國公賈秋壑按舊典賜茅及家廟在葛嶺集芳園改建廟奉五室同宇以饗四孟月祭器皆尚方所賜凡點領官吏灑掃兵士與花果月頒之隸版曹及京兆府如在京賜諸勛功廟儀左奏行館驛樟亭驛即浙江亭也在跨浦橋南江岸凡宰執辭免各出居此驛待報矣向有白樂天先生往驛訪楊舊曽賦詩曰往恨今愁應不殊題詩梁下又踟蹰羡兄獨夢見兄弟我到天明睡亦無夜半樟亭驛愁人起望鄉月明何處見潮水白茫茫北郭驛亭在餘杭門外北郭稅務之右都亭驛在候潮門裏泥路西侍從宅側次為館伴外國使人之地也本州倉場庫務鎮城倉常平倉糯米倉俱在餘杭門外師姑橋鹽事所都鹽倉在艮山門外天宗鹽倉在天宗水門內所轄諸鹽場十有二曰湯鎮仁和許村鹽官南路茶糟錢塘新興蜀山巖門上管下管等場又新興己下立場西興錢酒二場皆隸焉交木場在龍山抽解竹木場在浙江亭北又三場在江漲橋南餘杭塘上西闕三路也城西外場共二十有一處以便諸官廳及民廣排曰發賣鐵場炭場船場鑄冶場在東青門外北瓶場糴場在餘杭門外賣酒局在豐儲倉邊家渡之東交錢局在府治後都錢庫激賞庫軍資庫常平庫公使錢庫公使酒庫甲仗庫書版庫公使醋庫俱在州衙內回易庫在薦橋北外有公使醋子庫於城內外十有一庫耳或自沽賣止曰納息錢於點檢所樓店務在流福橋北有官設吏令宅務合於人員收掠民户年納白地賃錢稅務凡五處名曰都稅務浙江稅務龍山稅務北郭稅務江漲稅務但州府雖有稅務之名則朝家多有除放以便商賈諸貨壅於杭城具都作院在白魚池之側運司亦有木稅場在杭城外共人場也船場與架閣庫俱在薦橋門外提領犒賞酒庫所在樓店務之側點檢所酒庫點檢所官酒庫各庫有兩監官下有専吏酒匠掌其役但新煮兩界係本所關給工本下庫醖造所解利息聽充本府贍軍激賞公支則朝家無一毫取解耳曰東庫清煮俱為一在崇新門裏有酒樓名之太和廢之久矣曰西庫又名金文正庫清界庫在三橋南惠廷橋側煮界庫在湧金門外有酒樓扁之曰西樓南庫元名升陽宫煮界庫在社壇南新界庫在清河坊南酒樓扁之曰和樂北庫煮界庫在祥符橋東清界庫在鵝鴨橋東酒樓扁之曰春風曰中庫在衆樂坊北造清界有酒樓扁之曰中和煮庫在井亭橋北曰南上庫呼為銀甕子庫煮酒庫在東靑門外造清界庫在睦視坊北酒樓扁之曰和豐曰南外庫造清界庫在便門外清水閘造煮界庫在嘉會門外名之雪醅庫曰北外庫造煮界庫在江漲橋南清界庫在左家橋北酒樓扁之曰春融曰西溪庫清煮兩界俱在九里松大路乃一門分兩庫耳曰天宗庫造清界在天宗水門裏煮界庫在餘杭門外上閘東曰赤山庫造清界庫在赤山教場煎煮庫在左軍教場側曰崇新庫清煮西界俱在崇新門外曰徐村庫在六和塔南徐村市中其諸庫皆有官名角妓就庫設法賣酒此郡風流才子欲買一笑則徑往庫內點花牌惟意所擇但恐酒家人隱庇推託須是視識妓面及以微利啖之可也又有九小庫如安溪餘杭奉口解城鹽官長安許村臨平湯鎮更有碧香諸庫如錢塔門外上船亭南名為錢塘正庫有樓扁曰先得錢塘縣前名錢塘錢庫鵝鴨橋北曰北闕庫正在醋坊巷口也西橋東曰煮碧香庫禮部貢院對河橋西曰藩葑棧庫外有藩葑正庫在常州無錫縣並隸臨安府點檢酒所提領耳安撫司酒庫安撫司所管一道酒庫如餘杭縣間林酒庫石瀨步東西二酒庫臨安縣青山桃源二酒庫外有安吉州德清縣市名為德清正清庫五林闕纍曰德清東西二酒庫安吉州歸安縣曰璉市東西二酒庫嘉興府華亭縣曰上海酒庫廂禁軍臨安居輦轂之下蓋倚以為重武備一日不可闕而守帥所統則建炎之舊制至防虞一軍又必藉禁衛之士别為部伍三衙之兵亦聽帥臣節制以倡率之姑以兵制軍號一一述之使知衛兵各有兵統耳曰東南第三將自太祖朝分隸駐劄寨在東青門內元管十指揮後撥威果二十八指揮雄節九指揮于平江外見存者威節第一第四第五第六指揮雄節第八第十六指揮全捷第二第三指揮共統八指揮軍也曰京畿第三將元係東京畿縣陳留雍丘尉氏鄢陵陽武屯駐兵後劉俊統卒來捕陳留存留駐劄營在東青門裏所統武騎兩指揮勇廣四指揮廣捷三指揮忠節水軍饒猛伸威雄勇雄威各管一指揮效忠三指揮共統十七指揮軍也曰兵馬鈐轄司兵馬勇節威果全捷三指揮宿州龍騎歸逺二指揮因討睦寇留屯隸鈐轄司所管矣曰廂軍崇節捍江修江都作院小作院清湖閘開湖司北城堰西河廣濟樓店務長安堰閘稱斗務北城鼓角匠橫江水軍船務牢城各指揮兵士計兵士二萬五百八十七名之額曰城東城西外沙海外管界茶糟南蕩東椊上管赭山仁和鹽官黃灣硤石奉口許村巡檢司十六寨計兵卒一千三百四十四名之額防虞巡警臨安城郭廣闊户口繁夥民居屋宇高森接棟連簷寸尺無空巷陌壅塞階道狹小不堪其行多為風燭之患官府闕坊巷近二百餘步置一軍巡鋪以兵卒三五人為一鋪遇夜巡警地方盜賊煙火或有閙吵不律公事投鋪即與經廂發覺解州陳訟更有火下地分遇夜在官舍第宅名望之家伏路以防盜賊蓋官府以潛火為重於諸坊界置立防隅官屋屯駐軍兵及於森立望樓朝夕輪差兵卒卓望如有煙烻處以旗幟指其方向為號夜則易其燈若朝天門內以旗者三朝天門外以旗者二城外以旗者一則夜間以燈如旗分三等也曰東隅有望樓在柴垜橋都稅務南曰西隅有望樓在白龜池曰南隅有望樓在闕山至德觀後曰北隅在潘閬巷內曰上隅在大瓦子後三真君廟前曰中隅有望樓在下中沙巷蠟局橋東堍曰下隅有望樓在修文坊內曰府隅有望樓在府治側左院牆邊曰新隅在長慶坊曰新南隅在候潮門裏東曰新北隅在餘杭門裏曰新上隅在侍郎橋東皮場廟側曰西南隅在夀域坊仁王寺前曰南上隅在麗正門側儀鸞司相對曰城西隅在錢湖門外清化橋曰城北工隅左北郭稅務橋曰東北下隅有望樓在北新橋北曰錢塘隅有望樓在水磨頭放生亭後曰新西隅在九里松麯院路口曰海內隅在浙江亭南油局曰外沙隅在候潮門外外沙巡司曰城東隅在新門外城東巡司曰茶糟隅在東青門外茶糟巡司如遇煙烻救撲帥臣出於地分帶行府治內六隊救撲將佐軍兵及帳前四隊親兵隊搭材隊不併聽號令救撲並力撲滅支給犒賞若不竭力定依軍法治罪帥司節制軍馬浙西安撫司節制殿步兩司軍校雖係帥司節制元無統屬遇有速欲調遣及救撲煙烻須同朝旨調遣常不及事遂請於朝省得旨行下殿步兩司各差官兵千人各委統制官二員帶行正任兵馬鈐轄都監及添差兵馬鈐轄副都監職任於城內四壁置隅以備調遣復請朝堂欲冉於殿步二司差軍兵分任城外四壁防虞之責遂行下各司再選精軍三百人各以統制官二員仍帶本州鈐轄路分之職分任也並照城內四壁約束俱隸帥司節制自後兩浙運司申朝得旨令分官城內外北壁軍兵通行節制以便救撲且如防虞器具桶索旗號斧鋸燈籠火背心等器具俱是官司給支官錢措置一一俱備遇有救撲百司官吏便整隊伍急行奔馳駐劄遺漏地方聽行調遣不勞百姓餘力便可勦滅如宰執帥漕殿步帥臣間到地面指揮救撲百司官吏亦各詣所隸官司守局以備不測其修內司搭材等兵級亦同內侍分頭救滅或火勢侵其官舍戚里之家及烻燼畏威有傷百姓屋宇內庭纍令天使馭馬傳宣諸司帥臣速令將佐盡力撲滅毋致違慢如有違誤定行軍法治之帥漕二司遇行救撲官發錢買水澆滅富室豪户亦喝錢闕軍士盡力撲滅不致疏虞若救火軍卒重傷者所𨽻差官相視傷處支給犒賞差醫診治夢粱録卷十
