body:
  text: 夢粱録卷十九宋吳自牧撰園囿杭州苑圃俯瞰西湖髙挹兩峯亭館臺榭藏歌貯舞四時之景不同而樂亦無窮矣然歷年既多間有興廢今詳述之以為好事者之鑒在城萬松嶺內貴闕王氏富賢園三茅觀東山梅亭慶壽庵褚家塘東瓊花園清湖北慈明殿園楊府秀芳園張府北園楊府風雪當作雲慶會閣望仙橋下牛羊司側內侍蔣苑使住宅側築一圃亭臺花木最為富盛每嵗春月放人逰玩堂宇內頓放買賣關撲並體內庭規式如龍船鬧竿花籃花工用七寶珠翠竒巧裝結花朵冠梳並皆時樣官窰碗楪闕古玩具鋪列堂右倣如關撲歌叫之聲清婉可聽湯茶巧細車兒排設進呈之器桃村杏館酒肆裝成鄉落之景數畝之地觀者如市城東新門外東御園即富景園頃孝宗奉憲聖皇太后嘗逰幸五栁園即西園張府七位曹園南山長橋慶樂園舊名南園𨽻賜福邸園內有十樣亭榭工巧無二俗云魯班造者射圃走馬廊流杯池山洞堂宇宏麗野店村莊裝點時景觀者不倦內有關門名凌風關下香山巍然立於關前非古沉即枯枿木耳蓋考之志其聞見録所載者誤矣淨慈寺南翠芳園舊名屏山園內有八面亭堂一片湖山俱在目前雷峯塔寺前有張府真珠園內有髙堂極其華麗塔後謝府新園即舊甘內侍湖曲園羅家園白蓮寺園霍家園方家塢劉氏園北山集芳園四聖延祥觀御園此湖山勝景獨為冠頃有侍臣周紫芝從駕幸後山亭曽賦詩云附山結真祠朱門照湖水湖流入中池秀色歸淨几風簾邃旌幢神衛森劍履清芳宿華殿瑞霧蒙玉扆倣佛懷神京想像輪奐美祈年開新宫祝釐奉天子良辰後難會嵗暮得斯喜洲乃清樾中飛樓見千里霜車儻可乘吾事兹已矣便當賦逺逰未可回覆齒園有涼堂巍然在山巔後改為西太乙宫黃庭殿向朝臣髙似孫曽賦詩曰水明一色抱神洲雨壓輕塵不敢浮山北山南人喚酒春前春後客憑樓射熊館暗花扶扆下鵠池深栁拂舟白首都人能道舊君王曽奉上皇逰下竺寺園錢塘門外九曲墻下擇勝園錢塘正庫側新園城北隱秀園菩提寺後謝府玉壺園四井亭園昭慶寺後古栁林楊府雲洞園西園楊府具美園飲緑亭裴府山濤園葛嶺水仙廟西秀野園集芳園為賈秋壑賜第耳趙秀王府水月園張府凝碧園孤山路張內侍總宜園西林橋西水竹院落裏湖內諸內侍園圃樓臺森然亭館花木艷色奪景白公竹閣瀟灑清爽沿堤先賢堂三賢堂湖山堂園林茂盛裝點湖山九里松嬉逰園湧金門外隄北一清堂園顯應觀兩齋堂觀南聚景園孝光寧三帝嘗幸嵗久蕪圯僅存者一堂兩亭耳堂扁曰鑑逺亭曰花光一亭無扁植紅梅有兩橋曰栁浪曰學士皆粗見大槩惟夾徑老松益婆娑每盛夏秋首芙蕖繞隄如錦逰人艤舫賞之頃有侍從陸遊舟過作詩詠曰聖主憂民罷露臺春風别苑晝常開盡除曼衍魚龍戲不禁芻蕘雉兔來水鳥避人橫翠靄宫花經雨委蒼苔殘年自喜身強健又作清都夢一回又水殿西頭起砌臺緑楊鬧處杏花開簫韶本與人同樂羽衛才聞嵗一來鷁首波先涵藻荇金鋪雨後上莓苔逺臣侍宴應無日日望堯雲到晚回髙似孫逰園詠曰翠華不向苑中來可是年年惜露臺水際春風寒漠漠官梅却作野梅開張府泳澤環碧園舊名清暉園大小漁莊其餘貴府內官沿堤大小園圃水閣涼亭不堪其數御前宫觀俱有內苑以備車駕臨幸憩足之處內東太乙宫有內苑後一小山名曰武林山即杭州城主山也宰臣樓鑰曽賦長篇詠云易君求賦武林山身困塵勞無暫間我求挂冠欲歸去念此詩債須當還武林山出武林水靈隱後山無乃是此山亦復用此名細考其來真有以天目兩乳到錢塘一山環湖萬龍翔扶輿磅礴擁王氣皇居壯麗環宫墻湖隂一峯如怒猊勢臨城北尤瑰奇吳越大作緇黃廬為穿百井以厭之從來有龍必有珠此雖培塿千山餘中興南渡為行都崇列原廟太乙廬曽因祠事來登眺闤闠塵中有員嶠薰風時來洗泮暑緑樹隂隂隱殘照我得暫來猶醒心羡君清福住年深長安信美非吾土倦翼惟思歸故林城南則有玉津園在嘉會門外南四里紹興年間虜使來賀髙宗天申聖節遂宴射其中孝宗常臨逰幸玩會命皇太子宰執親王侍從五品以上官及管軍官講宴射禮孝宗御製詩賜皇太子以下官曰一天秋色破寒煙别禦連隄壓巨川欣見嵗功成萬寶因行射禮命群賢騰騰喜氣隨飛羽嫋嫋凄風入控弦文武從來資並用酒餘端有侍臣篇時光宗在東宫侍駕恭和曰秋深欲曉斂輕煙翠朩森圍萬里川閶闔啓關開法駕玉津按武會英賢皇皇聖父明如日挺挺良賢直似弦蹈舞歡呼稱萬嵗未饒天保報恩篇宰臣曽懷恭和曰名園佳氣靄非煙冠佩朝宗似百川五品並令陪宴射四鍭端欲序賔賢恩涵春意魚翻藻威入秋聲鴈落弦俟事更容窺典雅宸章應陋柏梁篇又江山秋日冠輕煙别院風光勝輞川位設虎侯恢盛典技精楊葉拔名賢禮均湛露宣飛斝樂奏鈞天看發弦聖主經文兼緯武全勝巡幸射蛟篇餘羣臣俱有恭和詩不悉載史魏王彌逺出判寧國府理廟命宰執侍從於此園設燕餞行有朝官胡銓賦詩曰餞行朱邸帝城春隨例顛忙宴玉津報國獨勞千一慮鈞天同聽十三人金巵宣勸君王重花露湔愁醉夢真却憶故人猿鶴在便思投老乞其身按玉津園乃東都舊名東坡嘗賦詩有紫壇南峙表連岡之句蓋亦密通園壇也嘉會門外有山名包家山內侍張侯壯觀園王保生園山上有關名桃花關舊扁蒸霞兩帶皆植桃花都人春時逰者無數為城南之勝境也城北西門外趙郭園又有錢塘門外溜水橋東西馬塍諸圃皆植怪松異檜四時奇花精巧窠兒多為龍蟠鳳舞飛禽走獸之狀每日市于都城好事者多買之以備觀賞也瓦舍瓦舍者謂其來時瓦合出時瓦解之義易聚易散也不知起於何時頃者京師甚為士庶放蕩不羈之所亦為子弟流連破壞之門杭城紹興間駐蹕於此殿岩楊和王因軍士多西北人是以城內外創立瓦舍招集伎樂以為軍卒暇日娛戲之地今貴家子弟郎君因此蕩逰破壞尤甚於汴都也其杭之瓦舍城內外不下十有七處如清泠橋西熙春樓下謂之南瓦子市南坊北三元樓前謂之中瓦子市西坊內三橋巷名大瓦子舊呼上瓦子衆安橋南羊棚樓前名下瓦子舊呼北瓦子鹽橋下蒲橋東謂之蒲橋瓦子又名東瓦子今廢為民居東青門外菜市橋側名菜市瓦子崇新門外章家橋南名薦橋門瓦子新開門外南名新門瓦子舊呼四通館保安門外名小堰門瓦子候潮門外北首名候潮門瓦子便門外北謂之便門瓦子錢湖門外南首省馬院前名錢湖門瓦子亦廢為民居後軍寨前謂之赤山瓦子靈隱天竺路行春橋側曰行春瓦子北郭稅務是北郭瓦子又名大通店米市橋下米市橋瓦子石牌頭北麻線巷內則曰舊瓦子塌房栁永詠錢塘詞曰參差十萬家此元豐前語也自髙宗車駕自建康幸杭駐蹕幾近二百餘年户口蕃息近百萬餘家杭城之外城東西南北各樓十里人煙生聚民物阜蕃市井坊陌鋪席駢盛數日經行不盡各可比外路一州郡足見杭城繁盛耳且城郭內北關水門裏有水路周回數里自梅家橋至白洋湖方家橋直到法物庫市舶前有慈元殿及富豪內侍諸司等人家於水次起造塌房數十所為屋數千間專以假賃與市郭間鋪席宅舍及客旅寄藏物貨并動具等物四面皆水不惟可避風燭亦可免偷盜極為利便蓋置塌坊家月月取索假賃者管巡廊錢會雇養人力遇夜巡警不致疏虞其他州郡如荆南沙市太平州黃池皆客商所聚雖云浩繁亦恐無此等穩當房屋矣社會文士有西湖詩社此乃行都縉紳之士及四方寓流儒人寄興適情賦詠膾炙人口流傳四方非其他社集之比武士有射弓踏弩社皆能攀弓射弩武藝精熟射放心親方可入此社耳更有蹴踘打毬射水弩社則非仕宦者為之蓋一等富室郎君風流子弟與間人所習也奉道者有靈寶會每月富室當供持誦正一經卷如正月初九日玉皇上帝誕日杭城行香諸富室就承天觀閣上建會北極佑聖真君聖降及誕辰士庶與羽流建會於宫觀或於舍庭誕辰日佑聖觀奉上旨建醮士庶炷香紛然諸寨建立聖殿者俱有社會則諸行亦有獻供之社遇三元日諸琳宫建普度會廣廣幽冥二月初三日梓潼帝君誕辰川蜀仕宦之人就觀建會三月二十八日東嶽誕辰四月初六日城隍誕日二月初八日霍山張真君聖誕四月初八日諸社朝五顯王慶佛會九月二十九日五王誕日每遇神聖誕日諸行市户俱有社會迎獻不一如府第內官以馬為社七寶行獻七寶玩具為社又有錦體社臺閣社窮富賭錢社遏雲社女童清音社蘇家巷傀儡社青果行獻時果社東西馬塍獻異松怪檜奇花社魚兒活行以異樣龜魚呈獻豪富子弟緋緑清音社十間等社有內官府第以精巧雕鏤筠籠養畜奇異飛禽迎獻者謂為可觀遇東嶽誕日更有錢燔社重囚加願社也奉佛者有上天竺寺光明會俱是富豪之家及大街鋪席施以大燭巨香助以齋資供米廣設勝會齋僧禮懺三日作大福田又有善女人皆府室宅舍內司之府第娘子夫人等建庚申會誦圓覺經俱戴珠翠珍寶首飾赴會人呼曰鬬寶會更有城東城北善友道者建茶湯會遇諸山寺院建會設齋及神聖誕日助緣設茶湯供衆四月初八日六和塔寺集童男童女善信人建朝塔會九月初一日湖州寺遇土神崇善王誕日亦以童男童女迎獻茶還心愫每月遇庚申日或八日諸寺庵舍集善信人誦經設齋或建西歸會寶叔塔寺每嵗春季建受生寄庫大齋會諸寺院清明建供天會七月十五日建盂蘭盆會二月十五日長明寺及諸教院建涅槃會四月八日西湖放生池建放生會頃者此會所集數萬人耳太平興國傳法寺向者建淨業會每月十七日集善男信人十八日集善女信人入寺誦經設齋聽法年終以所收資金建藥師道場七晝夜以終其會今廢之久矣其餘白蓮行法三壇等會各有所日分也間人間人本食客人孟嘗君門下有三千人皆客矣姑以今時府第宅舍言之食客者又訓導蒙童子弟者謂之館客又有講古論今吟詩和曲圍棋撫琴投壺打馬撇竹寫蘭名曰食客此之謂間人也更有一等不著業藝食於人家者此是無成子弟能文知書寫字善音樂今則百藝不通精専陪涉富豪子弟郎君逰宴執役甘為下流及相伴外方官員財主到都營幹乂有猥下之徒與妓館家書寫簡帖取送之類更專以參隨服役之生舊有百業皆通者如紐元子學像生叫聲教蟲蟻動音樂雜手藝唱詞白話打令商謎弄水使拳及善能取覆供過傳言送語又有專為棚頭鬬黃頭養百蟲蟻促織兒又謂之間漢凡擎鷹架鷂調鵓鴿鬬鵪鶉鬭雞賭撲落生之類又有一等手作人專攻刀鑷出入宅院趨奉郎君子弟專為幹當雜事插花挂畫説合交易幫涉妄作謂之涉兒蓋取過水之意更有一等不本色業藝專為探聽妓家賔客趕赴唱喏買物供過及逰湖酒樓飲宴所在以獻香送勸為由乞覓贍家財謂之厮波大抵此輩若顧之則貪婪不已不顧之則強顔取奉必滿其意而後已但看賞花宴飲君子出著發放何如耳雇覓人力凡雇倩人力及幹當人如解庫堂事貼窗鋪席主管酒肆食店博士鏜頭行菜過買外出鬙兒酒家人師公大伯等人又有府第宅舍內諸司都知太尉直殿御藥御帶內監寺廳分雇覓大夫書表司廳子虞候押番門子直頭轎番小厮兒廚子火頭直香燈道人園丁等人更有六房院府判提點五房院承旨太尉諸內司殿管判司幕士六部朝奉雇倩私身轎番安童等人或藥鋪要當鋪郎中前後作藥生作下及門面鋪席耍當鋪裹主管後作上門下䈋當直安童俱各有行老引領如有逃閃將帶東西有元地腳保識人前去跟尋如府宅官員豪富人家欲買寵妾歌童舞女廚娘針線供過粗細婢妮亦有官私牙嫂及引置等人但指揮便行踏逐下來或官員士夫等人欲出路還鄉上官赴任遊學亦有出陸行老雇倩腳夫郤從承攬在途服役無有失節四司六局筵會假賃凡官府春宴或鄉會或遇鹿鳴宴文武官試中設同年宴及聖節滿散祝夀公筵如遇宴席官府客將人吏差撥四司六局人員督責各有所掌無致茍簡或府第齋舍亦於官司差借執役如富家士庶吉筵凶席合用椅桌陳設書畫器皿盤盒動事之數則雇喚局分人員俱可完備凡事毋茍且謂四司六局所掌何職役開列於後如帳設司專掌仰塵録壓桌圍塔席簾幕繳額罘罳屏風書畫簇子畫帳等如茶酒司官府所用名賔客司掌賓客過茶湯斟酒上食喝揖而巳則民庶等客俱用茶酒司掌管筵席合用金銀酒茶器具及直茶湯暖蕩斟酒請坐咨席開話斟酒食上唱揖喝坐席迎送親姻吉筵慶夀邀賔筵會喪葬齋筵修設僧道齋供傳語取覆上書請客送聘禮合成姻禮儀先次迎詩等事廚司事前後掌筵生熟看食籹飣合食前後筵九盞食品坐歇坐泛勸品件放料批切調和精細美味美湯精巧簇花龍鳳勸盤等事臺盤司掌把盤打送賫擎勸盤出食碗楪等果子局掌裝簇飣盤看果時新水果南北京果海臘肥脯臠切像生花果勸酒品件蜜煎局掌簇飣看盤果套山子蜜煎像生窠兒菜蔬局掌筵上簇飣看盤菜蔬供筵泛供異品菜蔬時新品味糟藏像生件段等油燭局掌燈火照耀上燭修燭點照壓燈辦集立臺手肥豆臺竹籠燈臺裝火簇炭香藥局掌管龍涎沉腦清和清福異香香壘香爐香毬裝香簇畫細灰效事聽候換香酒後索喚異品醒酒湯藥餅兒排辦局掌椅桌交椅桌凳書桌及灑掃打渲拭抹供過之職蓋四司六局等人祗直慣熟不致失節省主者之勞也欲就名園異館寺觀亭堂或湖舫會賔但指揮局分水立可辦集皆能如儀俗諺云燒香點茶挂畫插花四般間事不宜戾家若有失節者是祗役人不精故耳且如筵會不拘大小或衆官筵上喝犒亦有次第先茶酒次廚司三伎樂四局分五本主人從此雖末事因筆述之耳夢粱録卷十九
