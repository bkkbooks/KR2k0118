body:
  text: 夢粱録卷十四宋吳自牧撰祠祭天子祭天地諸候祭社稷大夫祭五祀上得以兼下下不得以僣上古之制也宋朝自郊丘宗廟社稷與大中小三祠及土域山海江湖之神先賢名哲道德之士禦災捍患以死勤事功烈之臣皆寵以爵命列於祀典奉常有司嵗時薦饗焉郊丘在郊㑹門外三里净明院左右春首上辛祈穀四月夏雩冬至冬報皆郊壇行禮惟九月秋饗不壇而屋設會于净明齊宫春夏冬遇雨亦望祭于齊宫差宰執充獻官行事明堂郊祀歲則不重舉饗報之禮也正月上辛祀感生帝於宗陽宫齊殿四立日祀十神太乙祀于東西太乙宫惠昭昭慶齊宫在净慈寺對惠昭有壇殿及燎壇夏至日祭后土皇地祗立夏日祭熒惑立秋日祭白帝昭慶有望祭殿立夏祭南方嶽瀆立秋祭西方嶽瀆大社大稷壇在觀橋東以春秋二仲臘前一日祭皇地祇九宫貴神壇在東青門外以春秋二仲壇祭感生地及九宫貴神北太乙西南攝提正東軒轅東南招搖中央天符西北青龍正東咸池東北太隂正南天一之版位也藉田先農壇在玉津園南祀神農氏配以后稷氏以嵗時祀之髙禖壇在郊壇東壇祭設青帝神位于壇上南向配伏羲帝髙辛帝于西靣北又設從祀簡狄姜嫄位于壇下卯陛南西向北每歲春分日遣官致祭畢收徹二從祀饌弓韣弓矢入禁中后妃以次行禮海神壇在東青門外太平橋東祭江海神為太祀以春秋二仲遣從官行望祭禮太學春秋二仲上丁日祭先聖文宣王配先賢兖國公鄒國公沂國公郕國公及十哲先賢從祀七十二賢歷代賢哲忠孝公卿武學祀昭烈武成王配留侯祀歷代忠烈臣子山川神城隍廟在吳山賜額永固歲之豐凶水旱民之疾病禍福祈而必應朝廷纍加美號曰輔正康濟明德廣聖王昭濟廟在候潮門外渾水閘西相傳為吳王夫差廟加封曰善應安濟孚祐顯衛侯忠清廟在吳山其神姓伍名員乃楚大夫奢之子自唐立祠至宋亦祀之每歲海潮大溢衝激州城春秋醮祭詔命學士院撰青詞以祈國阜民安纍錫美號曰忠武英烈顯聖福安王有行祠在仁和縣治東南隅吳越錢武肅王廟在方家峪寶藏寺及龍山武功堂為錢文穆王廟五王俱祀焉平濟王在浙江廣子灣纍封曰顯烈廣順王順濟廟元浙江里人馮氏自侯加至王爵曰英烈王王封助靈祐順侯英顯于通應公廟即廟子頭楊村龍王廟是也平波祠賜額善順廟錢塘順濟龍王賜額昭應廟並在白塔嶺之原孚應廟在磨刀坑廣順廟在龍山惠順廟在江塘順濟龍王廟在湯村順濟宫三侯加王爵美號曰廣澤靈應曰順澤昭應曰敷澤加應自平濟至順濟十廟俱司江濤神也嘉澤廟在錢塘門外二里錢武肅曽封王爵今改封曰淵靈普濟侯水仙王廟在西湖第三橋會靈廟在卧栁洲五龍王廟在湧金門外上船亭龍井惠濟廟在風篁嶺美號王爵曰嘉應廣濟孚惠王南髙峯龍王祠在榮國寺後鉢盂潭纍封曰孚應昭順侯玉泉龍王祠在青芝塢淨空寺內其神加封美號曰嘉應溥澤公忠節祠旌忠廟在豐樂橋元在德夀宫基因建宫徙于此俗呼三聖廟按神姓髙將軍名永能綏州人姓景名崇儀思誼晉州人姓程名閣使博古河南人元豐年間因統軍戰殘廟食于鳯翔府和尚原後方臘寇睦禱於神凱奏而還始封侯爵後屢有功賜廟額加號王爵曰忠顯靈應孚澤昭祐王忠顯昭應孚濟廣祐王忠惠順應孚祐善利王以旌忠觀灑淨主其朝夕香燈之供祚德廟在車橋西青蓮寺南其神忠義有祠墓俱在絳州太平縣趙村以本州淪陷之久廟廷存廢不可知降㫖就杭建廟賜額加美號升三侯為王爵以表忠節程嬰封忠濟王杵臼封忠祐王韓厥封忠利王靈衛廟在錢塘門側其神因完顔宗弼侵境守臣退保赭山錢塘縣令朱蹕領衛司十將金勝祝威率民兵戰擊以寡制衆沒于王事鄉民感其忠義葬于近郊立祠以表死節鄉民陳于朝省賜廟額各封侯爵曰朱宰封顯忠侯金勝封忠佐侯祝威封忠祐侯以旌其忠烈之士也忠勇廟在行春橋寨闕中其神姓張名玘係親衛大夫果州團練使御營宿衛前軍統制因解海州圍歿于陳中得㫖贈容州觀察使建廟賜額海州仍立廟本寨昭節廟在保民坊廟巷東王班營按二神一姓喬名元字伯仁一姓陸名軌字仲模皆襄漢人在後周時同為殿侍初宋太祖受禪駕自宣祐門入守關者施弓箭拒而弗納移步趨它門而入既受朝賀畢顧近侍曰適移門守者何人奏曰散直班傳㫖降充下班又問宣祐守者何人答奏曰東三班傳㫖令宣引時本班之衆知天命所歸皆引義自殞太祖大驚趣駕臨幸慰問仍命排陳使党彥進前往救數十人問得二人不死者即喬陸二神召詰其故答曰臣止事一主所以乞死上慰勞再四謂汝等忠孝其班不廢且賜名曰長入祗候從其請所幸臨為前引仍賜青紅二色帛為帽飭滿三年授保義郎出職二神既受誓而退尋復效死上憫其忠節厚加賻恤聽本班廟祀南渡初吳山居民不戒于火楊殿岩觀緋緑二旗現于空中隱隱見喬陸二字其火遂息皆神之力也孝宗曽觀本班宿房以黃羅撲門槩遂宣問何所始左右備奏始末上嘉歎忠孝節義如此乙卯歲賜廟額庚申歲封侯爵甲子歲加大字號曰喬封忠義威福英惠侯陸封忠烈威德英祐侯顯功廟在保叔塔下神姓嶽名仲琚世居霍山為臨安府吏因烏珠侵境輸家資募勇士推尉司金祝二十將充首將領兵迎敵戰死合境懷其忠義祠于延祥四聖觀號為保稷山王鄉民申明于朝賜廟額顯功封爵曰忠翊侯以褒其忠節耳仕賢祠靈惠廟在江漲橋化度寺按神姓陳名項字行嵩會稽人仕于東晉使虜留三年仗節不屈拔劒斫羈復命于朝歷四州刺史食邑錢塘海鹽鹽官三縣之祿死葬于髙亭山梁朝封王爵號崇善宋朝賜廟額以禱雨而應初封侯纍加美號進王爵曰慈佑福善昭應王且神生則忠于國死則佑于民正謂之武功忠孝節義昭著有行祠凡四十餘處矣嘉澤廟在湧金門西井城下其神姓李名泌字長源唐朝相國鄴侯曽守杭有風績郡地苦於海汲民當醎水侯鑿六井引西湖清水入城中始得郡民飲清水郡人德之立祠奉有香火宋朝賜廟額以褒其德矣三賢堂在西湖蘇堤奉白樂天林和靖蘇東坡三先生之祠顯慶廟在龍井衍慶寺側神姓胡名則婺之永康人兩曽尹杭有惠政在郡無江潮之患疾告于朝以兵部侍郎致仕葬龍井山其本里萬岩山有方冦聚衆夜夢紫袍金帶神人現赤幟于空中隨即勦滅朝省褒嘉建廟賜額封賜爵顯靈侯仍賜墳額顯應神之赫靈鄉民著于方岩矣前萬岩作方岩則是昭貺廟在渾水閘東江塘上神姓張名夏雍丘人家授司封郎官為浙漕時因江潮為患故堤纍行修築不過三年輒損重勞民力遂作石堤得保無虞民感其功立祠於江塘上朝省褒贈太常少卿纍封公侯之爵次錫以王爵加美號曰靈濟顯佑威烈安順王祠之左右奉十潮神又有行祠在焉婆巷名安濟廟先賢堂在西湖蘇堤南山第一橋奉唐虞許箕公漢嚴先生吳先軍凌公晉文正范公中尉褚公宋龍驤將軍卜莊侯范先生齊褚先生顧先生杜先生梁太中大夫范公范先生記室褚公唐太常卿康公褚太尉褚公禮部尚書褚文公荆州大都督許公張先生後梁吳越武肅錢王給事中羅公宋秦王忠懿錢公吏部侍郎郎公知制誥謝公諫院錢公和靖先生林公翰林學士沈公太中大夫錢公龍圖學士陸錢虞三先生祕閣吳公入行崔先生太師崇國張文忠公孝節婦定夫人孫氏夫人虞氏孝女馮氏節婦何氏孝婦盛氏祠側以道館扁旌德專奉灑掃潘逍遙祠在潘閬巷以宅基建祠祀之古神祠夏禹王廟在錢湖門城側漢留侯祠在吳山靈護廟門漢蕭相國祠在定民坊艮山門外顯忠廟在長生老人橋俗呼霍使君廟加封美號曰忠烈順濟昭應王周赧王廟在錢塘崇化觀山防風氏廟在廉德朱奧申將軍廟在臨平斗門橋北周絳侯廟即絳侯周勃也在臨平鎮福德行慶真君廟在肇元升平里吳下世傳吳吕䝉也曹王廟在長樂像光湖南金奧村相傳曹子建也士俗祠顯應廟在臨安府治即淨因尼寺土地賜廟額封爵曰正祐安福使翼靈廟在府治相傳為永福鎮安王旌忠廟在天慶坊其神姓趙名延翰姓馬名仁禹並殿前指揮使左右班藝祖開基翊衛有功授節鉞贈侍中莫知廟食於杭自何而始金華將軍廟在湧金門內水池上神姓曹名杲真定人後唐為金華令仕于錢王嘗于城隅後鑿池名湧金邦人德之為立祠廣福廟在鹽橋神姓蔣世為杭人樂于賑施每嵗秋成之際糴穀同春夏價增時以穀如原價出糶不圖利源如歲歉則捐穀以豫飢者神死之日囑其二弟曰須存仁心力行好事二弟謹遵兄訓恪守不違里人立祠表其德行朝家祈禱無不感應遂賜廟額封爵及其二弟並進侯位曰孚順孚惠孚祐之美號也三將軍廟在潘閬巷嘉應公祠在秀義坊通應侯廟在開道坊護國天王廟白馬神祠在夀域坊今遷糧料院巷口故基玉仙堂在大隱坊內石姥祠在芳林鄉吳客三真君廟在石榴園巷義勇武安王及清源真君廟在西溪法華山一在半道紅街華嚴菩薩廟在闕潭半邏老人廟在縣東北霸王廟在芳林鄉㑹靈護國祠在端平橋東堍塘上靈休廟在城南廂江岸真聖廟在白塔嶺半山七娘子廟在皋亭山舊傳崇善王妹也蘇將軍廟其神東晋驃騎將軍靈應廟按神名楊都督並崇善王闕下神也義橋崔總管廟尚將軍廟四廟俱在肇元鄉秦王廟在天雲鄉古老相傳晋毛寶廟也濟惠福濟二王廟在像山湖西濟惠又祠在北葛沈村白龍王廟在臨平東山之中亦有龍祠在洞側通靈廟即黑龍王祠在超山趙忠獻為邑宰時禱雨有感屢應申朝省封加美號曰通靈惠應宣濟昭惠侯東都隨朝祠惠應廟即東都皮場廟自南渡時有直廟人商立者攜其神像隨朝至杭遂于吳山至德觀右立祖廟又於萬松嶺侍郎橋巷元貞橋立行祠者三按㑹要云神在東京顯仁坊名曰皮場土地祠政和年間賜廟額封王爵中興隨朝到杭纍加號曰明靈昭惠慈佑王神妃封曰靈婉嘉德夫人靈淑嘉靖夫人按廟刻云其神乃古神農於三皇時都曲阜世人食腥膻者率致物故因集天下孝義勇烈之士二十四人分十二分野播種采藥至今于世極有神功兩廡奉二十四仙醫使者是也自漢唐至今殲寇助順具有聖跡不可殫紀二郎神即清源妙道真君在官巷紹興年間建祠舊志云東京有祠隨朝立之外郡行祠東嶽行宫有五曰吳山曰西溪法華山曰臨平景星觀曰湯鎮順濟宫曰湯村壜山梵剎俱奉東嶽天齊仁聖帝香火廣惠行宫有三曰錢塘門外霍山曰在城金地山曰千頃寺按㑹要真君姓張名渤血食廣德軍之祠山始封靈濟王纍加美號昭烈大帝後改封昌福真君今加寶號曰正佑聖烈昭德昌福崇仁真君自祖父祖母以下若聖妃若諸弟諸子諸婦及女俱錫宋朝上爵封之然都人士庶奉祀者有禱必應如響斯答仰山二王廟在觀橋東馬軍司西營按宜春志二神俱姓蕭自漢顯靈世該祀典至宋功烈尤著錫以王爵王之祖父母若妻若子若婦皆錫爵號開慶衝潭有變臨瑞至太平皆不能前神之陰相默助居多陳于朝褒其功烈改賜美號曰顯德仁聖忠佑靈濟王福德聖仁忠惠康王其王祖父母以下及左右佐神并僞仰二祖師凡列祠者咸皆賚焉顯佑廟在仁和百萬新倉西按神姓陳名果仁字韋之晉陵人仕于隋歷司徒有叛臣沈法興謀叛忌司徒威聲以食毒而斃其神忠憤赫靈以神矢中法興死之唐武德間嘉其功廟祀焉封爵忠烈公梁加封福順忠烈王至後周封帝號宋政和賜廟常州以帝號非禮易以王爵曰福順武烈顯應昭德王仍奉詔書馳駟賜忠祐廟傳以幣板而别為文告于行祠因咸淳二年十二月將郊祀天地命京尹潜皋墅祈雪祥禱于廟即降大雪蕆事之際明星有爛三靈顧歆由是歲豐四方無虞皋墅識于行祠壁以昭靈貺申朝賜爵遣吏緘詞馳送忠佑廟及别告于顯佑行祠以表大神之顯靈也如此靈順廟即徽州婺源靈祠餘杭立行祠者七一在南髙峰頂榮國寺有華光樓旁為射亭有角抵臺又闢山徑而夷之以便登陟一在北髙峰為景德靈隱寺後山塔廟一在錢塘門外九曲城下一在錢塘縣調露鄉靈感寺一在候潮門外瓶場灣一在候潮門普濟橋東欏朩教場側普濟寺一在錢塘縣六和塔寺南徐村新石塘宋朝賜五王美號曰顯聰昭聖孚仁福善王顯明昭聖孚義福順王顯正昭聖孚智福應王顯直昭聖孚信福佑王顯德昭聖孚愛福惠王每歲都人瓣香致敬者紛紛咸趨焉順濟聖妃廟在艮山門外又行祠在城南蕭公松橋及候潮門外瓶場河下市舶司側按廟記姓林莆田人氏數著靈異立祠莆之聖堆宣和間賜廟額纍加夫人美號後封妃加號曰靈惠協應嘉應善慶聖妃其妃之靈者多于海洋之中佑護船舶其功甚大民之疾苦悉賴帡幪廣靈廟在石塘壩奉東嶽溫將軍請于朝賜廟額封自溫將軍以下九神皆錫侯爵曰溫封正佑李封孚佑鐵封靈佑劉封顯佑楊封順佑康封安佑張封廣佑嶽封協佑孟封昭佑韋封威佑梓潼帝君在吳山承天觀此蜀中神專掌注祿籍凡四方士子求名赴選者悉禱之封王爵曰惠文忠武孝德仁聖王王之父母及妃若子若孫若婦若女俱褒賜顯爵美號建嘉慶樓奉香燈矣夢粱録卷十四
